apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitnesstrack-httproute
spec:
  parentRefs:
  - name: norah-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /
    backendRefs:
    - name: fitness-tracker-service 
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hospital-httproute
spec:
  parentRefs:
  - name: norah-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hospital
    filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /
    backendRefs:
    - name: hospital-service 
      port: 80
      

